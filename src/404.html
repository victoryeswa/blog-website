<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/blog-website/">
  <title>Page Not Found | Kenya Bloomberg</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f4f6f8; color: #212529; }
    .page-not-found { text-align: center; padding: 36px; background: white; border-radius: 24px; box-shadow: 0 20px 45px rgba(23,59,117,0.08); max-width: 540px; }
    .page-not-found h1 { margin: 0 0 18px; font-size: 3rem; }
    .page-not-found p { margin: 0 0 24px; color: #5f6d7b; line-height: 1.6; }
    .page-not-found a { display: inline-block; padding: 14px 26px; background: #1c5cc7; color: white; border-radius: 999px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page-not-found">
    <h1>404</h1>
    <p>It looks like the page you’re looking for doesn’t exist. Return to the homepage to continue reading Kenya news and insights.</p>
    <a href="index.html">Back to homepage</a>
  </div>
</body>
</html>
